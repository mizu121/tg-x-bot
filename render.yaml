services:
  - type: worker
    name: tg-x-bot
    runtime: docker
    plan: starter
    disk:
      name: bot-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: ADMIN_CHAT_IDS
        sync: false
      - key: APIFY_MAX_CHARGE_USD
        value: "0.05"
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "1"
      - key: MAX_UPLOAD_MB
        value: "49"
      - key: SEND_AS_DOCUMENT_MB
        value: "45"
      - key: MAX_REELS_PER_REQUEST
        value: "5"
      - key: DOWNLOAD_TTL_MINUTES
        value: "90"
      - key: DOWNLOAD_MAX_TOTAL_MB
        value: "600"
      - key: PROGRESS_INTERVAL_SECONDS
        value: "0.9"
      - key: PROGRESS_FRAMES
        value: ">>>>>-----"
      - key: DOWNLOAD_DIR
        value: "/var/data/downloads"
      - key: FAILURE_LOG_PATH
        value: "/var/data/logs/failures.jsonl"
      - key: FAILURE_LOG_MAX_ENTRIES
        value: "200"
      - key: MESSAGE_LOG_PATH
        value: "/var/data/logs/messages.jsonl"
      - key: MESSAGE_LOG_MAX_ENTRIES
        value: "500"
      - key: LOG_FULL_URLS
        value: "false"
      - key: LOG_TRACEBACKS
        value: "false"
      - key: TELEGRAM_SAFE_VIDEO_TRANSCODE
        value: "true"
      - key: VIDEO_TRANSCODE_CRF
        value: "28"
      - key: VIDEO_TRANSCODE_PRESET
        value: "ultrafast"
      - key: VIDEO_TRANSCODE_MAX_WIDTH
        value: "720"
      - key: VIDEO_TRANSCODE_MAX_HEIGHT
        value: "1280"
      - key: VIDEO_TRANSCODE_THREADS
        value: "1"
      - key: VIDEO_TRANSCODE_TIMEOUT_SECONDS
        value: "240"
      - key: YOUTUBE_CLIENTS
        value: "mweb,web_safari,android,web"
      - key: YOUTUBE_FALLBACK_CLIENTS
        value: "android,web;web_safari;tv;ios"
      - key: YOUTUBE_PO_PROVIDER
        value: "none"
